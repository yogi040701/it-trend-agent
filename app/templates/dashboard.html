<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT Trend Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060a0f;
      --surface: #0c1318;
      --surface2: #111920;
      --border: #1a2a35;
      --accent-fire: #ff5c35;
      --accent-emerald: #00e5a0;
      --accent-red: #ff3b5c;
      --accent-sky: #38c7ff;
      --accent-gold: #ffc940;
      --text: #e8f0f5;
      --muted: #4a6272;
      --dim: #2a3d4a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(56, 199, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56, 199, 255, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -40%;
      left: -20%;
      width: 70%;
      height: 80%;
      background: radial-gradient(ellipse, rgba(56, 199, 255, 0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      animation: pulse 8s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { transform: translate(0, 0) scale(1); opacity: 0.6; }
      to   { transform: translate(5%, 5%) scale(1.1); opacity: 1; }
    }

    /* ─── HEADER ─────────────────────────────────── */
    header {
      position: relative;
      z-index: 10;
      padding: 32px 40px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .logo-group {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--accent-sky), var(--accent-emerald));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 24px rgba(56, 199, 255, 0.3);
    }

    .logo-text h1 {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .logo-text span {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 229, 160, 0.08);
      border: 1px solid rgba(0, 229, 160, 0.2);
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 12px;
      font-family: 'Space Mono', monospace;
      color: var(--accent-emerald);
    }

    .dot {
      width: 7px;
      height: 7px;
      background: var(--accent-emerald);
      border-radius: 50%;
      animation: blink 2s ease-in-out infinite;
      box-shadow: 0 0 6px var(--accent-emerald);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .run-btn {
      background: var(--accent-fire);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 20px rgba(255, 92, 53, 0.3);
    }

    .run-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 30px rgba(255, 92, 53, 0.5);
    }

    .run-btn:active { transform: translateY(0); }

    /* ─── TIMESTAMP BAR ──────────────────────────── */
    .timestamp-bar {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 40px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .timestamp-bar .refresh-info {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .progress-ring {
      width: 14px;
      height: 14px;
    }

    .progress-ring circle {
      fill: none;
      stroke: var(--accent-sky);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 38;
      stroke-dashoffset: 38;
      animation: ring 60s linear infinite;
      transform-origin: center;
      transform: rotate(-90deg);
    }

    @keyframes ring {
      to { stroke-dashoffset: 0; }
    }

    /* ─── MAIN GRID ──────────────────────────────── */
    main {
      position: relative;
      z-index: 10;
      max-width: 1400px;
      margin: 0 auto;
      padding: 36px 40px;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: auto;
      gap: 20px;
    }

    /* ─── CARDS ──────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.3s;
      animation: fadeUp 0.5s ease both;
    }

    .card:hover {
      border-color: var(--dim);
      transform: translateY(-2px);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:nth-child(1) { animation-delay: 0.05s; grid-column: span 6; }
    .card:nth-child(2) { animation-delay: 0.10s; grid-column: span 6; }
    .card:nth-child(3) { animation-delay: 0.15s; grid-column: span 4; }
    .card:nth-child(4) { animation-delay: 0.20s; grid-column: span 8; }
    .card:nth-child(5) { animation-delay: 0.25s; grid-column: span 12; }

    /* card accent stripe */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 3px;
      border-radius: 16px 16px 0 0;
    }

    .card-fire::before   { background: linear-gradient(90deg, var(--accent-fire), #ff9a35); }
    .card-emerald::before { background: linear-gradient(90deg, var(--accent-emerald), #00b8a9); }
    .card-red::before    { background: linear-gradient(90deg, var(--accent-red), #ff7c9a); }
    .card-sky::before    { background: linear-gradient(90deg, var(--accent-sky), #7eb3ff); }
    .card-gold::before   { background: linear-gradient(90deg, var(--accent-gold), #ff9a35); }

    /* glow accent in corner */
    .card-fire::after    { content: ''; position: absolute; top: -30px; right: -30px; width: 120px; height: 120px; background: radial-gradient(circle, rgba(255,92,53,0.1), transparent 70%); pointer-events: none; }
    .card-emerald::after { content: ''; position: absolute; top: -30px; right: -30px; width: 120px; height: 120px; background: radial-gradient(circle, rgba(0,229,160,0.1), transparent 70%); pointer-events: none; }
    .card-red::after     { content: ''; position: absolute; top: -30px; right: -30px; width: 120px; height: 120px; background: radial-gradient(circle, rgba(255,59,92,0.1), transparent 70%); pointer-events: none; }
    .card-sky::after     { content: ''; position: absolute; top: -30px; right: -30px; width: 120px; height: 120px; background: radial-gradient(circle, rgba(56,199,255,0.1), transparent 70%); pointer-events: none; }
    .card-gold::after    { content: ''; position: absolute; top: -30px; right: -30px; width: 120px; height: 120px; background: radial-gradient(circle, rgba(255,201,64,0.1), transparent 70%); pointer-events: none; }

    /* ─── CARD HEADER ───────────────────────────── */
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .card-icon {
      font-size: 20px;
      line-height: 1;
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .card-count {
      margin-left: auto;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 100px;
    }

    /* ─── TAG ITEMS ──────────────────────────────── */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      list-style: none;
    }

    .tag {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid transparent;
      transition: all 0.2s;
      cursor: default;
      animation: tagIn 0.4s ease both;
    }

    @keyframes tagIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    .tag:hover { transform: scale(1.05); }

    .tag-fire {
      background: rgba(255, 92, 53, 0.1);
      border-color: rgba(255, 92, 53, 0.3);
      color: #ff8c6e;
    }

    .tag-emerald {
      background: rgba(0, 229, 160, 0.1);
      border-color: rgba(0, 229, 160, 0.3);
      color: #5fffc8;
    }

    .tag-red {
      background: rgba(255, 59, 92, 0.1);
      border-color: rgba(255, 59, 92, 0.3);
      color: #ff7c9a;
    }

    .tag-sky {
      background: rgba(56, 199, 255, 0.1);
      border-color: rgba(56, 199, 255, 0.3);
      color: #7dd9ff;
    }

    .tag-gold {
      background: rgba(255, 201, 64, 0.1);
      border-color: rgba(255, 201, 64, 0.3);
      color: #ffd875;
    }

    .tag-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tag-fire   .tag-dot { background: var(--accent-fire); box-shadow: 0 0 4px var(--accent-fire); }
    .tag-emerald .tag-dot { background: var(--accent-emerald); box-shadow: 0 0 4px var(--accent-emerald); }
    .tag-red    .tag-dot { background: var(--accent-red); box-shadow: 0 0 4px var(--accent-red); }
    .tag-sky    .tag-dot { background: var(--accent-sky); box-shadow: 0 0 4px var(--accent-sky); }
    .tag-gold   .tag-dot { background: var(--accent-gold); box-shadow: 0 0 4px var(--accent-gold); }

    /* ─── SKILL ROWS ────────────────────────────── */
    .skill-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .skill-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
      animation: tagIn 0.4s ease both;
    }

    .skill-item:hover {
      border-color: rgba(56, 199, 255, 0.4);
      background: rgba(56, 199, 255, 0.05);
    }

    .skill-rank {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      min-width: 20px;
    }

    .skill-bar-wrap {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .skill-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-sky), var(--accent-emerald));
      border-radius: 2px;
      animation: barGrow 0.8s ease both;
    }

    @keyframes barGrow {
      from { width: 0 !important; }
    }

    /* ─── NEWS FEED ─────────────────────────────── */
    .news-list {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 10px;
    }

    .news-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.4;
      color: #8fa8ba;
      transition: all 0.2s;
      animation: tagIn 0.4s ease both;
    }

    .news-item:hover {
      border-color: rgba(255, 201, 64, 0.3);
      color: var(--text);
      background: rgba(255, 201, 64, 0.04);
    }

    .news-num {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      padding-top: 2px;
      min-width: 18px;
    }

    /* ─── EMPTY STATE ───────────────────────────── */
    .empty {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      padding: 20px 0;
      text-align: center;
    }

    /* ─── LOADING SKELETON ──────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
      height: 32px;
    }

    @keyframes shimmer {
      from { background-position: 200% 0; }
      to   { background-position: -200% 0; }
    }

    /* ─── TOAST ─────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--surface);
      border: 1px solid var(--accent-emerald);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      font-family: 'Space Mono', monospace;
      color: var(--accent-emerald);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px rgba(0,229,160,0.15);
      z-index: 999;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* ─── NEWS POPUP ─────────────────────────────── */
    .news-item {
      cursor: pointer;
      position: relative;
    }

    .news-item .news-click-hint {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      margin-left: auto;
      padding-left: 8px;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .news-item:hover .news-click-hint { opacity: 1; }

    /* Overlay */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(6, 10, 15, 0.75);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .popup-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    /* Popup card */
    .popup-card {
      background: var(--surface);
      border: 1px solid var(--accent-gold);
      border-radius: 18px;
      padding: 30px 32px;
      max-width: 520px;
      width: 90%;
      position: relative;
      box-shadow: 0 0 60px rgba(255, 201, 64, 0.12), 0 24px 60px rgba(0,0,0,0.6);
      transform: translateY(20px) scale(0.97);
      transition: transform 0.3s cubic-bezier(0.34, 1.4, 0.64, 1);
    }

    .popup-overlay.active .popup-card {
      transform: translateY(0) scale(1);
    }

    .popup-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--accent-gold);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .popup-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(255,201,64,0.3), transparent);
    }

    .popup-headline {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 18px;
      line-height: 1.5;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .popup-summary {
      font-size: 14px;
      line-height: 1.75;
      color: #8fa8ba;
      min-height: 80px;
    }

    .popup-summary.loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
    }

    .ai-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .popup-close {
      position: absolute;
      top: 14px;
      right: 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 28px;
      height: 28px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .popup-close:hover {
      border-color: var(--accent-red);
      color: var(--accent-red);
    }

    .popup-footer {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .ai-badge {
      background: rgba(56, 199, 255, 0.1);
      border: 1px solid rgba(56, 199, 255, 0.2);
      color: var(--accent-sky);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 9px;
      letter-spacing: 1px;
    }

    /* Typing cursor effect */
    .typing-cursor::after {
      content: '|';
      animation: blink-cursor 0.7s step-end infinite;
      color: var(--accent-gold);
    }

    @keyframes blink-cursor {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ─── RESPONSIVE ─────────────────────────────── */
    @media (max-width: 900px) {
      header { padding: 20px; }
      main { padding: 20px; gap: 14px; }
      .card:nth-child(1),
      .card:nth-child(2),
      .card:nth-child(3),
      .card:nth-child(4),
      .card:nth-child(5) { grid-column: span 12; }
      .header-right .run-btn { display: none; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo-group">
      <div class="logo-icon">🤖</div>
      <div class="logo-text">
        <h1>IT Trend Agent</h1>
        <span>POWERED BY PHI-3 · LOCAL LLM</span>
      </div>
    </div>
    <div class="header-right">
      <div class="status-pill">
        <span class="dot"></span>
        AGENT ACTIVE
      </div>
      <button class="run-btn" onclick="triggerAgent()">⚡ Run Agent</button>
    </div>
  </header>

  <!-- TIMESTAMP BAR -->
  <div class="timestamp-bar">
    <span id="lastUpdated">Fetching latest analysis…</span>
    <div class="refresh-info">
      <svg class="progress-ring" viewBox="0 0 14 14">
        <circle cx="7" cy="7" r="5"/>
      </svg>
      AUTO-REFRESH IN 60S
    </div>
  </div>

  <!-- MAIN DASHBOARD -->
  <main>

    <!-- 🔥 Trending -->
    <div class="card card-fire">
      <div class="card-header">
        <span class="card-icon">🔥</span>
        <span class="card-title">Trending Technologies</span>
        <span class="card-count" id="count-trending">—</span>
      </div>
      <ul class="tag-list" id="trending">
        <div class="skeleton" style="width:80px"></div>
        <div class="skeleton" style="width:110px"></div>
        <div class="skeleton" style="width:70px"></div>
      </ul>
    </div>

    <!-- 🌱 Emerging -->
    <div class="card card-emerald">
      <div class="card-header">
        <span class="card-icon">🌱</span>
        <span class="card-title">Emerging Technologies</span>
        <span class="card-count" id="count-emerging">—</span>
      </div>
      <ul class="tag-list" id="emerging">
        <div class="skeleton" style="width:90px"></div>
        <div class="skeleton" style="width:75px"></div>
        <div class="skeleton" style="width:120px"></div>
      </ul>
    </div>

    <!-- 📉 Declining -->
    <div class="card card-red">
      <div class="card-header">
        <span class="card-icon">📉</span>
        <span class="card-title">Declining Technologies</span>
        <span class="card-count" id="count-declining">—</span>
      </div>
      <ul class="tag-list" id="declining">
        <div class="skeleton" style="width:100px"></div>
        <div class="skeleton" style="width:80px"></div>
      </ul>
    </div>

    <!-- 🧠 Skills -->
    <div class="card card-sky">
      <div class="card-header">
        <span class="card-icon">🧠</span>
        <span class="card-title">Skills to Learn</span>
        <span class="card-count" id="count-skills">—</span>
      </div>
      <ul class="skill-list" id="skills">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </ul>
    </div>

    <!-- 📰 News -->
    <div class="card card-gold">
      <div class="card-header">
        <span class="card-icon">📰</span>
        <span class="card-title">Latest News Feed</span>
        <span class="card-count" id="count-news">—</span>
      </div>
      <ul class="news-list" id="news">
        <div class="skeleton" style="height:44px"></div>
        <div class="skeleton" style="height:44px"></div>
        <div class="skeleton" style="height:44px"></div>
      </ul>
    </div>

  </main>

  <!-- NEWS BRIEF POPUP -->
  <div class="popup-overlay" id="popupOverlay" onclick="closePopup(event)">
    <div class="popup-card">
      <button class="popup-close" onclick="closePopupDirect()">✕</button>
      <div class="popup-label">🤖 AI BRIEF</div>
      <div class="popup-headline" id="popupHeadline"></div>
      <div class="popup-summary" id="popupSummary"></div>
      <div class="popup-footer">
        <span class="ai-badge">PHI-3 · LOCAL LLM</span>
        GENERATED SUMMARY · ~60 WORDS
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    function showToast(msg, color = '#00e5a0') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.borderColor = color;
      t.style.color = color;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function fillTags(id, items, colorClass) {
      const ul = document.getElementById(id);
      const count = document.getElementById('count-' + id);
      ul.innerHTML = '';
      if (!items || items.length === 0) {
        ul.innerHTML = '<p class="empty">No data available</p>';
        count.textContent = '0';
        return;
      }
      count.textContent = items.length;
      items.forEach((item, i) => {
        const li = document.createElement('li');
        li.className = `tag tag-${colorClass}`;
        li.style.animationDelay = `${i * 0.05}s`;
        li.innerHTML = `<span class="tag-dot"></span>${item}`;
        ul.appendChild(li);
      });
    }

    function fillSkills(items) {
      const ul = document.getElementById('skills');
      const count = document.getElementById('count-skills');
      ul.innerHTML = '';
      if (!items || items.length === 0) {
        ul.innerHTML = '<p class="empty">No data available</p>';
        count.textContent = '0';
        return;
      }
      count.textContent = items.length;
      items.forEach((item, i) => {
        const barWidth = Math.max(30, 100 - i * (50 / items.length));
        const li = document.createElement('li');
        li.className = 'skill-item';
        li.style.animationDelay = `${i * 0.06}s`;
        li.innerHTML = `
          <span class="skill-rank">${String(i + 1).padStart(2, '0')}</span>
          <span style="flex:1">${item}</span>
          <div class="skill-bar-wrap">
            <div class="skill-bar" style="width:${barWidth}%"></div>
          </div>`;
        ul.appendChild(li);
      });
    }

    function fillNews(items) {
      const ul = document.getElementById('news');
      const count = document.getElementById('count-news');
      ul.innerHTML = '';
      if (!items || items.length === 0) {
        ul.innerHTML = '<p class="empty">No news available</p>';
        count.textContent = '0';
        return;
      }
      count.textContent = items.length;
      items.forEach((item, i) => {
        const li = document.createElement('li');
        li.className = 'news-item';
        li.style.animationDelay = `${i * 0.03}s`;
        li.innerHTML = `
          <span class="news-num">${String(i + 1).padStart(2, '0')}</span>
          <span style="flex:1">${item}</span>
          <span class="news-click-hint">⚡ CLICK FOR BRIEF</span>`;
        li.addEventListener('click', () => openNewsPopup(item));
        ul.appendChild(li);
      });
    }

    // ─── POPUP LOGIC ──────────────────────────────
    const summaryCache = {};

    async function openNewsPopup(headline) {
      const overlay = document.getElementById('popupOverlay');
      const headlineEl = document.getElementById('popupHeadline');
      const summaryEl = document.getElementById('popupSummary');

      headlineEl.textContent = headline;
      overlay.classList.add('active');

      // Use cache if available
      if (summaryCache[headline]) {
        summaryEl.className = 'popup-summary';
        typewriterEffect(summaryEl, summaryCache[headline]);
        return;
      }

      // Show loading state
      summaryEl.className = 'popup-summary loading';
      summaryEl.innerHTML = `<div class="ai-spinner"></div> Analyzing with Phi-3…`;

      try {
        const response = await fetch("/news-brief", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ headline: headline })
            });
            const data = await response.json();
            const brief = data.brief || "Could not generate summary. Please try again.";

        summaryCache[headline] = brief;
        summaryEl.className = 'popup-summary';
        typewriterEffect(summaryEl, brief);

      } catch (err) {
        summaryEl.className = 'popup-summary';
        summaryEl.textContent = '⚠ Failed to generate brief. Check your connection.';
        summaryEl.style.color = 'var(--accent-red)';
      }
    }

    function typewriterEffect(el, text) {
      el.textContent = '';
      el.classList.add('typing-cursor');
      let i = 0;
      const speed = 18;
      const interval = setInterval(() => {
        el.textContent += text[i];
        i++;
        if (i >= text.length) {
          clearInterval(interval);
          el.classList.remove('typing-cursor');
        }
      }, speed);
    }

    function closePopup(e) {
      if (e.target === document.getElementById('popupOverlay')) closePopupDirect();
    }

    function closePopupDirect() {
      document.getElementById('popupOverlay').classList.remove('active');
    }

    // Close on Escape key
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closePopupDirect();
    });

    async function loadTrends() {
      try {
        const res = await fetch('/trends');
        if (!res.ok) throw new Error('API error');
        const data = await res.json();

        if (data.date) {
          const d = new Date(data.date);
          document.getElementById('lastUpdated').textContent =
            'Last analysis: ' + d.toLocaleString(undefined, {
              weekday: 'short', year: 'numeric', month: 'short',
              day: 'numeric', hour: '2-digit', minute: '2-digit'
            });
        }

        const a = data.analysis || {};
        fillTags('trending', a.top_trending_technologies, 'fire');
        fillTags('emerging', a.emerging_technologies, 'emerald');
        fillTags('declining', a.declining_technologies, 'red');
        fillSkills(a.skills_for_backend_python_developer);
        fillNews(data.news);

      } catch (err) {
        document.getElementById('lastUpdated').textContent = 'Failed to load data — retrying…';
        showToast('⚠ Connection error', '#ff3b5c');
      }
    }

    async function triggerAgent() {
      const btn = document.querySelector('.run-btn');
      btn.textContent = '⏳ Running…';
      btn.disabled = true;
      try {
        await fetch('/run-agent', { method: 'POST' });
        showToast('✓ Agent triggered successfully');
        setTimeout(loadTrends, 3000);
      } catch {
        showToast('⚠ Failed to trigger agent', '#ff3b5c');
      }
      btn.textContent = '⚡ Run Agent';
      btn.disabled = false;
    }

    // Initial load + auto refresh
    loadTrends();
    setInterval(loadTrends, 60000);
  </script>
</body>
</html>
